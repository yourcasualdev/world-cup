version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: worldcup_db
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: worldcup
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - worldcup_network

  redis:
    image: redis:7-alpine
    container_name: worldcup_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - worldcup_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worldcup_backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - DATABASE_URL=postgresql://worldcup:password123@postgres:5432/worldcup?schema=public
      - REDIS_URL=redis://redis:6379
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY}
      - PORT=8080
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - worldcup_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: worldcup_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8080}/api/v1
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - worldcup_network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: worldcup_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks:
      - worldcup_network

volumes:
  postgres_data:
  redis_data:

networks:
  worldcup_network:
    driver: bridge
