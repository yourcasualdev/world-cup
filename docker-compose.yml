version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: worldcup_db
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: worldcup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: worldcup_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: worldcup_backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://worldcup:password123@postgres:5432/worldcup?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # frontend:
  #   build: ./frontend
  #   container_name: worldcup_frontend
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - ./frontend/.env
  #   depends_on:
  #     - backend
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
